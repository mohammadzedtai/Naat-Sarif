<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naat Sarif</title>
    <link rel="icon" href="N!.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .back {
            background-color: rgb(58, 75, 75);
            color: black;
            display: grid;
            width: 100%;
            justify-content: center;
        }

        .N1 {
            width: 400px;
            height: auto;
            margin: 10px 0 10px 0;
            background-color: aliceblue;
            color: black;
            border: 1px solid black;
            border-radius: 50px;
        }

        a {
            text-decoration: none;
            color: black;
        }

        h1 {
            display: flex;
            justify-content: center;
           margin: 5px;

        }

        header {
            position: sticky;
            top: 0px;
        }



        nav {
            background-color: aqua;
            width: 100%;
            height: 70px;
            padding: 0 5%;
            display: flex;
            justify-content: center;
            align-items: center;

        }

      
        @media (max-width: 500px) {
            .N1 {
                max-width: 300px;
                height: auto;
            }

            nav img {
                width: 300px;
                height: auto;
            }

            h1 {
                font-size: 30px;
            }
        }
    </style>
</head>

        <nav>
            <div style="font-size: 50px;"><a href="index.html">⬅</a></div>
            <img width="500px" height="80px" src="./Basmala.svg.png" alt="">
